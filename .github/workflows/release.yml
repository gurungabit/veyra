name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-15-intel
            script: app:dist:mac
            artifact: veyra-macos
            paths: |
              apps/flash-client/release/*.dmg
              apps/flash-client/release/*.zip
              apps/flash-client/release/*.blockmap
          - name: Windows
            os: windows-2022
            script: app:dist:win
            artifact: veyra-windows
            paths: |
              apps/flash-client/release/*.exe
              apps/flash-client/release/*.zip
              apps/flash-client/release/*.blockmap

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      VEYRA_ALLOW_EXTERNAL_FLASH: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @veyra/flash-client typecheck

      - name: Package app
        run: pnpm ${{ matrix.script }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: main-${{ github.run_number }}.${{ github.run_attempt }}
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          gh release create "$TAG_NAME" "${files[@]}" \
            --target "$GITHUB_SHA" \
            --title "Veyra $TAG_NAME" \
            --notes "Automated build from main at $GITHUB_SHA.

          These artifacts are unsigned CI builds and are packaged with external Pepper Flash mode enabled. Install Artix Game Launcher or provide a PPAPI Pepper Flash plugin locally before running Veyra."
