name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  version:
    name: Plan semantic release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.preview.outputs.should_release }}
      version: ${{ steps.preview.outputs.version }}
      tag: ${{ steps.preview.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Preview release
        id: preview
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm release:preview

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: version
    if: needs.version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-15-intel
            script: app:dist:mac
            artifact: veyra-macos
            paths: |
              apps/flash-client/release/*.dmg
              apps/flash-client/release/*.zip
          - name: Windows
            os: windows-2022
            script: app:dist:win
            artifact: veyra-windows
            paths: |
              apps/flash-client/release/*.exe
              apps/flash-client/release/*.zip

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      VEYRA_ALLOW_EXTERNAL_FLASH: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version
        run: pnpm release:set-version ${{ needs.version.outputs.version }}

      - name: Typecheck
        run: pnpm --filter @veyra/flash-client typecheck && pnpm script-updates:typecheck

      - name: Package app
        run: pnpm ${{ matrix.script }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  release:
    name: Publish semantic release
    runs-on: ubuntu-latest
    needs: [version, build]
    if: needs.version.outputs.should_release == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm release
