<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob: file:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veyra Launcher</title>
    <link rel="stylesheet" href="./styles.css?v=20260531-launcher-theme-4" />
  </head>
  <body class="launcher-body">
    <main class="launcher-shell">
      <header class="launcher-topbar">
        <div class="launcher-title">
          <h1>Veyra Launcher</h1>
          <span id="launcher-status">Loading accounts and servers...</span>
        </div>

        <div class="launcher-meta" aria-label="Launcher counts">
          <span id="account-count-label">0 accounts</span>
          <span id="server-count-label">-- servers</span>
        </div>

        <div class="launcher-actions">
          <button id="launcher-update-button" class="launcher-update-button" data-update-state="idle" type="button" hidden>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.42l2.3 2.3V4a1 1 0 0 1 1-1Zm-7 15a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1Z"></path>
            </svg>
            <span data-update-label>Check updates</span>
          </button>
          <label class="launcher-theme-control">
            <span>Theme</span>
            <select id="launcher-theme-select" aria-label="Application theme"></select>
          </label>
          <button id="refresh-servers" type="button">Refresh</button>
          <button id="open-empty-client" type="button">Open Client</button>
        </div>
      </header>

      <section class="launcher-grid">
        <section class="launcher-panel accounts-panel">
          <div class="panel-heading">
            <div>
              <h2>Accounts</h2>
              <p id="selection-summary">No accounts selected</p>
            </div>

            <div class="field server-field">
              <span>Login Server</span>
              <div id="server-dropdown" class="server-dropdown">
                <button id="server-dropdown-button" class="server-dropdown-button" type="button" aria-haspopup="listbox" aria-expanded="false">
                  <span id="server-dropdown-label">Loading servers...</span>
                  <i class="server-dropdown-arrow" aria-hidden="true"></i>
                </button>
                <div id="server-dropdown-menu" class="server-dropdown-menu" role="listbox"></div>
              </div>
            </div>
          </div>

          <div class="server-card">
            <span class="server-led" aria-hidden="true"></span>
            <div>
              <strong id="server-summary">Server list loading...</strong>
              <small>Selected login target</small>
            </div>
          </div>

          <div id="account-list" class="account-list"></div>

          <div class="launcher-footer">
            <button id="select-all" type="button">Select All</button>
            <button id="start-selected" class="primary launch-primary" type="button">Start Selected</button>
          </div>
        </section>

        <aside class="launcher-side">
          <section class="launcher-panel account-editor">
            <h2>Add Account</h2>
            <label class="field">
              <span>Username</span>
              <input id="account-username" autocomplete="username" />
            </label>
            <label class="field">
              <span>Password</span>
              <input id="account-password" autocomplete="current-password" type="password" />
            </label>
            <label class="field">
              <span>Label</span>
              <input id="account-label" placeholder="Optional display name" />
            </label>
            <div class="field">
              <span>Default Server</span>
              <div id="account-server-dropdown" class="server-dropdown">
                <button id="account-server-dropdown-button" class="server-dropdown-button" type="button" aria-haspopup="listbox" aria-expanded="false">
                  <span id="account-server-dropdown-label">Use Login Server</span>
                  <i class="server-dropdown-arrow" aria-hidden="true"></i>
                </button>
                <div id="account-server-dropdown-menu" class="server-dropdown-menu" role="listbox"></div>
              </div>
            </div>
            <button id="save-account" class="primary" type="button">Save Account</button>
          </section>

          <section class="launcher-panel launcher-log-wrap">
            <div class="log-heading">
              <span>Activity</span>
              <span id="log-count">0</span>
            </div>
            <pre id="launcher-log" class="launcher-log"></pre>
          </section>
        </aside>
      </section>
    </main>
    <script type="module" src="../dist/launcher.js?v=20260531-launcher-theme-4"></script>
  </body>
</html>
